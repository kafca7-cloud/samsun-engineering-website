<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SS-SVC-32CX 설치 위치 도식 — 대형 디젤엔진 실린더 헤드 상단 장착">
  <defs>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="cylGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="gasGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,140,0,0.4)"/>
      <stop offset="100%" stop-color="rgba(200,30,0,0.1)"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="480" fill="#f5f5f5"/>
  
  <!-- 격자 -->
  <g stroke="#e8e8e8" stroke-width="0.5" fill="none">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
  </g>
  
  <!-- ============ 엔진 단면 ============ -->
  <g transform="translate(140, 100)">
    
    <!-- 실린더 헤드 -->
    <rect x="0" y="80" width="320" height="100" fill="url(#headGrad)" stroke="#000" stroke-width="2"/>
    <text x="160" y="132" text-anchor="middle" fill="#ffc400" font-size="13" font-weight="700" font-family="Pretendard, sans-serif" letter-spacing="1">
      CYLINDER HEAD
    </text>
    <text x="160" y="150" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10" font-family="Pretendard, sans-serif">
      실린더 헤드
    </text>
    
    <!-- 실린더 본체 -->
    <rect x="40" y="180" width="240" height="140" fill="url(#cylGrad)" stroke="#000" stroke-width="2"/>
    
    <!-- CYLINDER 라벨 — 좌측 영역으로 이동 (피스톤 로드 안 가림) -->
    <text x="95" y="252" text-anchor="middle" fill="#ffc400" font-size="13" font-weight="700" font-family="Pretendard, sans-serif" letter-spacing="1">
      CYLINDER
    </text>
    <text x="95" y="270" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Pretendard, sans-serif">
      실린더
    </text>
    
    <!-- 연소실 -->
    <ellipse cx="160" cy="180" rx="100" ry="20" fill="url(#gasGrad)" opacity="0.7"/>
    <text x="160" y="184" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="9" font-weight="600" font-family="Pretendard, sans-serif" letter-spacing="0.5">
      COMBUSTION CHAMBER
    </text>
    
    <!-- 피스톤 -->
    <rect x="60" y="208" width="200" height="14" fill="#444" stroke="#000" stroke-width="1.5"/>
    <text x="160" y="219" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="8" font-family="Pretendard, sans-serif">
      PISTON
    </text>
    
    <!-- 피스톤 로드 (중앙에 수직) -->
    <rect x="150" y="222" width="20" height="90" fill="#333" stroke="#000" stroke-width="1"/>
    
    <!-- ============ SS-SVC-32CX 부품 — 도면 형상에 맞춰 다시 그림 ============ -->
    <!-- 노란 강조 원 (전체 부품 감싸기) -->
    <circle cx="160" cy="40" r="42" fill="rgba(255,196,0,0.18)" filter="url(#glow)"/>
    <circle cx="160" cy="40" r="36" fill="none" stroke="#ffc400" stroke-width="2.5" stroke-dasharray="4 3"/>
    
    <!-- 부품 본체 (도면 형상 참조해서 재설계) -->
    <g>
      <!-- 상단 너트 (체결부) - 작은 헥사곤 -->
      <polygon points="160,8 165,11 165,17 160,20 155,17 155,11" fill="#777" stroke="#000" stroke-width="1"/>
      
      <!-- 상단 본체 (Indicator Cock 윗부분) - 사각 박스 -->
      <rect x="153" y="20" width="14" height="14" fill="#666" stroke="#000" stroke-width="1.2"/>
      
      <!-- 메인 본체 (세로 긴 막대 - Indicator Cock 본체) -->
      <rect x="156" y="34" width="8" height="32" fill="#555" stroke="#000" stroke-width="1.2"/>
      
      <!-- 측면 출구 (Safety Valve 비스듬히 나오는 부분) -->
      <g transform="rotate(30, 162, 55)">
        <rect x="162" y="50" width="22" height="10" fill="#666" stroke="#000" stroke-width="1.2"/>
        <!-- Safety Valve 끝 -->
        <rect x="180" y="52" width="6" height="6" fill="#777" stroke="#000" stroke-width="1"/>
      </g>
      
      <!-- 하단 플랜지 (실린더 헤드 접합부) -->
      <rect x="150" y="66" width="20" height="6" fill="#444" stroke="#000" stroke-width="1.2"/>
      
      <!-- 플랜지 볼트 표시 (양쪽 작은 원) -->
      <circle cx="153" cy="69" r="1.5" fill="#222"/>
      <circle cx="167" cy="69" r="1.5" fill="#222"/>
    </g>
    
    <!-- 부품 → 라벨 화살표 -->
    <g stroke="#1a1a1a" stroke-width="1.5" fill="none">
      <line x1="200" y1="40" x2="350" y2="40" stroke-dasharray="0"/>
      <polygon points="350,40 343,36 343,44" fill="#1a1a1a"/>
    </g>
    
    <!-- 라벨 박스 -->
    <g transform="translate(360, 18)">
      <rect x="0" y="0" width="180" height="48" fill="#1a1a1a" stroke="#ffc400" stroke-width="2"/>
      <text x="14" y="20" fill="#ffc400" font-size="14" font-weight="800" font-family="Pretendard, sans-serif" letter-spacing="0.5">
        SS-SVC-32CX
      </text>
      <text x="14" y="38" fill="rgba(255,255,255,0.85)" font-size="10" font-weight="500" font-family="Pretendard, sans-serif">
        설치 위치 (Installation Point)
      </text>
    </g>
    
    <!-- 압력 흐름 (연소실 → 부품, 점선) -->
    <g stroke="#ffc400" stroke-width="1.5" fill="none" stroke-dasharray="3 3" opacity="0.7">
      <path d="M 160 175 Q 160 130, 160 80"/>
    </g>
    <polygon points="160,75 156,82 164,82" fill="#ffc400" opacity="0.7"/>
    
  </g>
  
  <!-- ============ 하단 설명 ============ -->
  <g transform="translate(140, 425)">
    <g>
      <rect x="0" y="0" width="6" height="50" fill="#ffc400"/>
      <text x="18" y="14" fill="#1a1a1a" font-size="11" font-weight="800" font-family="Pretendard, sans-serif" letter-spacing="1.5">
        FUNCTION · 기능
      </text>
      <text x="18" y="32" fill="#555" font-size="11" font-family="Pretendard, sans-serif">
        · 연소실 압력 측정 (Indicator Cock)
      </text>
      <text x="18" y="46" fill="#555" font-size="11" font-family="Pretendard, sans-serif">
        · 과압 발생 시 안전 배출 (Safety Valve)
      </text>
    </g>
    
    <g transform="translate(360, 0)">
      <rect x="0" y="0" width="6" height="50" fill="#ffc400"/>
      <text x="18" y="14" fill="#1a1a1a" font-size="11" font-weight="800" font-family="Pretendard, sans-serif" letter-spacing="1.5">
        APPLICATION · 적용
      </text>
      <text x="18" y="32" fill="#555" font-size="11" font-family="Pretendard, sans-serif">
        · 대형 디젤엔진 실린더 헤드 상단
      </text>
      <text x="18" y="46" fill="#555" font-size="11" font-family="Pretendard, sans-serif">
        · 노후 엔진 단종 부품 대체용
      </text>
    </g>
  </g>
  
  <!-- 좌상단 라벨 -->
  <g transform="translate(40, 30)">
    <rect x="0" y="0" width="3" height="22" fill="#ffc400"/>
    <text x="10" y="11" fill="#1a1a1a" font-size="10" font-weight="800" font-family="Pretendard, sans-serif" letter-spacing="2">
      INSTALLATION DIAGRAM
    </text>
    <text x="10" y="25" fill="#888" font-size="9" font-family="Pretendard, sans-serif">
      설치 위치 도식 (단면도)
    </text>
  </g>
  
  <!-- 우상단 모델명 -->
  <g transform="translate(620, 30)">
    <text x="0" y="11" fill="#1a1a1a" font-size="11" font-weight="800" font-family="Pretendard, sans-serif" letter-spacing="1">
      SS-SVC-32CX
    </text>
    <text x="0" y="25" fill="#888" font-size="9" font-family="Pretendard, sans-serif">
      © SAMSUN Engineering
    </text>
  </g>
  
</svg>