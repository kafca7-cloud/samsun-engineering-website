/* ============================================================
   SAMSUN 공통 디자인 토큰
   - 모든 서브 페이지가 사용하는 CSS 변수와 기본 스타일
   - 이 파일을 수정하면 모든 서브 페이지에 자동 반영됨
   ============================================================ */

:root {
  /* 색상 */
  --cat-yellow: #FFC400;
  --cat-yellow-dim: rgba(255,196,0,0.12);
  --cat-yellow-soft: rgba(255,196,0,0.06);
  --cat-black: #000000;
  --cat-dark: #0d0d0d;
  --cat-card: #1a1a1a;
  --cat-elev: #262626;
  --cat-hairline: #262626;
  --cat-hairline-soft: #3c3c3c;
  --cat-white: #ffffff;
  --cat-gray1: #f5f5f5;
  --cat-gray2: #e0e0e0;
  --cat-gray3: #7e7e7e;
  --cat-gray4: #555555;
  --cat-gray5: #2a2a2a;
  --cat-body: #bbbbbb;
  --cat-body-strong: #e6e6e6;
  --cat-border: #d6d6d6;

  /* 레이아웃 */
  --max-w: 1280px;

  /* 폰트 */
  --font-body: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-head: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

/* ─── 기본 리셋 ─── */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  color: var(--cat-black);
  background: var(--cat-white);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  padding-top: 64px;
}
a { color: inherit; text-decoration: none; }

/* ─── 단순 페이지 헤더 (← 홈으로) ─── */
nav#mainNav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: var(--cat-white);
  border-bottom: 3px solid var(--cat-yellow);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.nav-inner {
  max-width: var(--max-w); margin: 0 auto;
  padding: 0 2rem; height: 64px;
  display: flex; align-items: center; justify-content: flex-end;
}
.home-btn {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--cat-black);
  font-size: 14px; font-weight: 600;
  letter-spacing: 0.3px;
  text-decoration: none;
  padding: 8px 16px;
  border: 1px solid var(--cat-black);
  background: transparent;
  transition: background 0.18s, color 0.18s;
  font-family: var(--font-body);
  white-space: nowrap;
}
.home-btn:hover {
  background: var(--cat-black);
  color: var(--cat-yellow);
}
.home-btn .arrow {
  font-size: 16px;
  line-height: 1;
}

/* ─── HERO 영역 공통 스타일 ─── */
.hero {
  position: relative;
  min-height: 360px;
  padding: 140px 2rem 80px;
  background: linear-gradient(135deg, var(--cat-black) 0%, var(--cat-dark) 100%);
  color: var(--cat-white);
  display: flex; align-items: center;
  overflow: hidden;
}
.hero-stripe {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 5px; background: var(--cat-yellow);
  z-index: 2;
}
.hero-inner {
  max-width: var(--max-w); margin: 0 auto; width: 100%;
  position: relative; z-index: 2;
}
.hero-label {
  display: inline-block;
  font-size: 12px; font-weight: 700; letter-spacing: 2px;
  color: var(--cat-yellow);
  padding: 6px 14px; border: 1px solid rgba(255,196,0,0.4);
  margin-bottom: 1.5rem;
}
.hero h1 {
  font-size: clamp(2.2rem, 5vw, 3.6rem);
  font-weight: 800; letter-spacing: -1.5px; line-height: 1.15;
  margin-bottom: 1.2rem;
}
.hero h1 em { color: var(--cat-yellow); font-style: normal; }
.hero p.lead {
  font-size: 1.05rem; color: rgba(255,255,255,0.75);
  max-width: 720px; line-height: 1.7;
  margin-bottom: 2rem;
}
.hero p.lead strong { color: var(--cat-white); font-weight: 700; }

/* ─── CTA 섹션 공통 스타일 ─── */
.cta-section {
  background: var(--cat-black); color: var(--cat-white);
  padding: 80px 2rem;
  text-align: center;
}
.cta-inner { max-width: 720px; margin: 0 auto; }
.cta-eyebrow, .cta-label {

  color: var(--cat-yellow); margin-bottom: 1rem;
}
.cta-title {
  font-size: clamp(1.6rem, 3.5vw, 2.4rem);
  font-weight: 800; letter-spacing: -0.8px; line-height: 1.3;
  margin-bottom: 1rem; word-break: keep-all;}
.cta-title em { color: var(--cat-yellow); font-style: normal; }
.cta-sub, .cta-desc {
  font-size: 1rem; color: rgba(255,255,255,0.7);
  margin-bottom: 2.5rem; line-height: 1.7;
}
.cta-actions {
  display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
}
.btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 16px 32px;
  font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
  font-family: var(--font-body);
  border: 1px solid transparent; cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}
.btn-primary {
  background: var(--cat-yellow); color: var(--cat-black);
}
.btn-primary:hover { background: #e6b000; }
.btn-secondary {
  background: transparent; color: var(--cat-white);
  border-color: rgba(255,255,255,0.3);
}
.btn-secondary:hover {
  border-color: var(--cat-yellow); color: var(--cat-yellow);
}

/* ─── 모바일 반응형 ─── */
@media (max-width: 560px) {

/* lead 문단 안에서 줄바꿈 자연스럽게 */

  }

/* 매우 작은 화면 — 텍스트 살짝 축소 */

  <div class="preview-container">
    <div class="preview-header">
      <h3 id="previewTitle">미리보기</h3>
      <button type="button" class="preview-close" onclick="closePreview()" aria-label="닫기">✕</button>
    </div>
    <div class="preview-body">
      <iframe id="previewFrame" src="" frameborder="0"></iframe>
    </div>
    <div class="preview-footer">
      <a id="previewDownload" href="" download class="lib-btn lib-btn-download">PDF 다운로드</a>
    </div>
  </div>
</div>

<!-- 모바일 하단 고정 문의 바 (≤860px에서만 노출) -->
<div class="mobile-contact-bar" aria-label="문의 빠른 액션">
  <a href="tel:0616421247" class="mcb-btn mcb-call">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

<script>
(async function() {
  const listEl = document.getElementById('libList');
  const filterBar = document.getElementById('filterBar');
  let allFiles = [];
  let currentFilter = 'all';

  try {
    const response = await fetch('/resources/library/files.json?v=' + Date.now());
    if (!response.ok) throw new Error('Load failed');
    allFiles = await response.json();
    allFiles = allFiles
      .filter(f => f.published !== false)
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    renderList();
  } catch (err) {
    console.error('자료 로드 실패:', err);
    listEl.innerHTML = renderEmpty('자료실 준비 중입니다', '곧 다운로드 가능한 형태로 준비하겠습니다.');
  }

  function renderList() {
    const filtered = currentFilter === 'all'
      ? allFiles
      : allFiles.filter(f => f.category === currentFilter);

    if (filtered.length === 0) {
      listEl.innerHTML = renderEmpty(
        currentFilter === 'all' ? '자료실 준비 중입니다' : '해당 카테고리의 자료가 없습니다',
        currentFilter === 'all' ? '곧 다운로드 가능한 형태로 준비하겠습니다.' : '다른 카테고리를 확인해 주세요.'
      );
      return;
    }

    listEl.innerHTML = '<div class="lib-grid">' + filtered.map(f => {
      const fileSize = f.size && f.size !== '—' ? '· ' + f.size : '';
      const fileType = f.type ? f.type : 'PDF';
      const url = f.url || '#';
      const isExternal = f.url && f.url.startsWith('http');
      const previewBtn = isExternal 
        ? '<a href="' + url + '" target="_blank" rel="noopener" class="lib-btn lib-btn-preview">바로가기</a>'
        : '<button type="button" class="lib-btn lib-btn-preview" data-url="' + url + '" data-title="' + escapeHtml(f.title) + '">미리보기</button>';
      const downloadBtn = isExternal
        ? ''
        : '<a href="' + url + '" class="lib-btn lib-btn-download" download>다운로드</a>';
      
      return '<div class="lib-card">' +
        '<span class="lib-card-cat">' + (f.category || '자료') + '</span>' +
        '<h3>' + escapeHtml(f.title) + '</h3>' +
        '<p class="lib-card-desc">' + escapeHtml(f.description || '') + '</p>' +
        '<div class="lib-card-meta"><span>📄 ' + fileType + '</span><span>' + fileSize + '</span></div>' +
        '<div class="lib-card-actions">' + previewBtn + downloadBtn + '</div>' +
      '</div>';
    }).join('') + '</div>';
    
    // 미리보기 버튼 이벤트
    listEl.querySelectorAll('.lib-btn-preview[data-url]').forEach(btn => {
      btn.addEventListener('click', function() {
        openPreview(this.dataset.url, this.dataset.title);
      });
    });
  }

  function renderEmpty(title, msg) {
    return '<div class="lib-empty">' +
      '<div class="lib-empty-icon">📚</div>' +
      '<h2>' + title + '</h2>' +
      '<p>' + msg + '<br>필요한 자료는 전화(061-642-1247) 또는 문의 폼으로 요청해 주세요.</p>' +
      '</div>';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  // 미리보기 함수 (전역)
  window.openPreview = function(url, title) {
    const modal = document.getElementById('previewModal');
    const frame = document.getElementById('previewFrame');
    const titleEl = document.getElementById('previewTitle');
    const downloadEl = document.getElementById('previewDownload');
    
    titleEl.textContent = title || '미리보기';
    frame.src = url;
    downloadEl.href = url;
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  };
  
  window.closePreview = function() {
    const modal = document.getElementById('previewModal');
    const frame = document.getElementById('previewFrame');
    modal.style.display = 'none';
    frame.src = '';
    document.body.style.overflow = '';
  };
  
  // ESC 키로 닫기
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') window.closePreview();
  });

  filterBar.addEventListener('click', (e) => {
    if (!e.target.matches('.filter-btn')) return;
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.dataset.cat;
    renderList();
  });
})();
</script>

</body>
</html>
