<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공지사항 | SAMSUN 삼선엔지니어링</title>
<meta name="description" content="㈜삼선엔지니어링 공지사항 — 회사 소식, 사업 안내, 정비 일정 등 주요 공지 사항을 안내합니다.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://www.samsuneng.co.kr/resources/notice/">

<meta property="og:type" content="website">
<meta property="og:title" content="공지사항 | SAMSUN 삼선엔지니어링">
<meta property="og:description" content="㈜삼선엔지니어링 공지사항.">
<meta property="og:url" content="https://www.samsuneng.co.kr/resources/notice/">
<meta property="og:locale" content="ko_KR">

<style>
{{> design-tokens}}

.page-hero {
  background: var(--cat-black);
  color: var(--cat-white);
  padding: 90px 2rem 70px;
  position: relative;
  border-left: 6px solid var(--cat-yellow);
}
.page-hero-inner { max-width: 1100px; margin: 0 auto; }
.page-hero-label {
  display: inline-block;
  font-size: 11px; font-weight: 800; letter-spacing: 3px;
  color: var(--cat-yellow); margin-bottom: 1rem;
}
.page-hero h1 {
  font-size: 40px; font-weight: 800; line-height: 1.25;
  margin: 0 0 1rem; letter-spacing: -0.5px;
}
.page-hero p.lead {
  font-size: 16px; line-height: 1.8;
  color: rgba(255,255,255,0.8); max-width: 720px; word-break: keep-all;
}

.notice-filter { background: var(--cat-white); padding: 32px 2rem 0; }
.filter-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; gap: 8px; flex-wrap: wrap;
  border-bottom: 1px solid var(--cat-border); padding-bottom: 20px;
}
.filter-btn {
  background: var(--cat-white); color: var(--cat-gray4, #555);
  border: 1px solid var(--cat-border);
  padding: 8px 16px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.filter-btn:hover { background: var(--cat-gray1, #f5f5f5); color: var(--cat-black); }
.filter-btn.active {
  background: var(--cat-black); color: var(--cat-yellow); border-color: var(--cat-black);
}

.notice-section { background: var(--cat-white); padding: 32px 2rem 80px; }
.notice-inner { max-width: 1100px; margin: 0 auto; }

.notice-item {
  display: grid; grid-template-columns: 110px auto 1fr;
  gap: 1.5rem; padding: 1.6rem;
  background: var(--cat-white); border-bottom: 1px solid var(--cat-border);
  transition: background 0.15s;
  text-decoration: none; color: inherit; align-items: center;
}
.notice-item:hover { background: var(--cat-yellow-soft, #fffbe6); }
.notice-item:hover .notice-title {
  text-decoration: underline; text-decoration-thickness: 2px;
  text-underline-offset: 4px; text-decoration-color: var(--cat-yellow);
}
.notice-date {
  font-size: 13px; color: var(--cat-gray3); font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.notice-cat {
  font-size: 11px; font-weight: 800; letter-spacing: 1px;
  color: var(--cat-yellow); background: var(--cat-black);
  padding: 5px 12px; text-transform: uppercase; white-space: nowrap;
}
.notice-cat.urgent { background: #c44; color: var(--cat-white); }
.notice-title {
  font-size: 16px; font-weight: 700;
  color: var(--cat-black); word-break: keep-all; line-height: 1.45;
}

.notice-empty {
  text-align: center; padding: 60px 2rem;
  background: var(--cat-gray1, #f5f5f5); border-left: 4px solid var(--cat-yellow);
}
.notice-empty-icon { font-size: 48px; margin-bottom: 1rem; }
.notice-empty h2 {
  font-size: 24px; font-weight: 800; color: var(--cat-black);
  margin: 0 0 0.8rem; letter-spacing: -0.3px;
}
.notice-empty p {
  font-size: 15px; line-height: 1.7; color: var(--cat-gray4, #555);
  margin: 0 auto; max-width: 540px; word-break: keep-all;
}

.notice-loading {
  text-align: center; padding: 40px 2rem;
  color: var(--cat-gray3); font-size: 14px;
}

@media (max-width: 700px) {
  .page-hero { padding: 60px 1.2rem 50px; }
  .page-hero h1 { font-size: 28px; }
  .notice-section, .notice-filter { padding-left: 1.2rem; padding-right: 1.2rem; }
  .notice-item {
    grid-template-columns: 1fr; gap: 0.6rem;
    padding: 1.2rem 1rem;
  }
  .notice-cat { justify-self: start; }
}

/* 한글 단어 단위 줄바꿈 (전역) — 폭/정렬 영향 없이 줄바꿈만 단어 단위로 */
body { word-break: keep-all; }
table, td, th, code, pre { word-break: normal; }
</style>
</head>
<body>

{{> header-sub}}

<section class="page-hero">
  <div class="page-hero-inner">
    <div class="page-hero-label">NOTICE</div>
    <h1>공지사항</h1>
    <p class="lead">
      ㈜삼선엔지니어링의 회사 소식, 사업 안내, 정비 일정 등 주요 공지 사항을 안내합니다.
    </p>
  </div>
</section>

<section class="notice-filter">
  <div class="filter-inner" id="filterBar">
    <button class="filter-btn active" data-cat="all">전체</button>
    <button class="filter-btn" data-cat="회사 소식">회사 소식</button>
    <button class="filter-btn" data-cat="사업 안내">사업 안내</button>
    <button class="filter-btn" data-cat="정비 일정">정비 일정</button>
    <button class="filter-btn" data-cat="긴급">긴급</button>
  </div>
</section>

<section class="notice-section">
  <div class="notice-inner" id="noticeList">
    <div class="notice-loading">공지를 불러오는 중...</div>
  </div>
</section>

{{> cta-section}}

{{> mobile-contact-bar}}

<script>
(async function() {
  const listEl = document.getElementById('noticeList');
  const filterBar = document.getElementById('filterBar');
  let allPosts = [];
  let currentFilter = 'all';

  try {
    const response = await fetch('/resources/notice/posts.json?v=' + Date.now());
    if (!response.ok) throw new Error('Load failed');
    allPosts = await response.json();
    allPosts = allPosts
      .filter(p => p.published !== false)
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    renderList();
  } catch (err) {
    console.error('공지 로드 실패:', err);
    listEl.innerHTML = renderEmpty('공지사항 준비 중입니다', '곧 새로운 소식으로 찾아뵙겠습니다.');
  }

  function renderList() {
    const filtered = currentFilter === 'all'
      ? allPosts
      : allPosts.filter(p => p.category === currentFilter);

    if (filtered.length === 0) {
      listEl.innerHTML = renderEmpty(
        currentFilter === 'all' ? '공지사항 준비 중입니다' : '해당 카테고리의 공지가 없습니다',
        currentFilter === 'all' ? '곧 새로운 소식으로 찾아뵙겠습니다.' : '다른 카테고리를 확인해 주세요.'
      );
      return;
    }

    listEl.innerHTML = filtered.map(p => {
      const catClass = p.category === '긴급' ? 'notice-cat urgent' : 'notice-cat';
      const dateFmt = p.date ? p.date.replace(/-/g, '.') : '';
      return '<a href="' + p.url + '" class="notice-item">' +
        '<div class="notice-date">' + dateFmt + '</div>' +
        '<div class="' + catClass + '">' + (p.category || '소식') + '</div>' +
        '<div class="notice-title">' + escapeHtml(p.title) + '</div>' +
        '</a>';
    }).join('');
  }

  function renderEmpty(title, msg) {
    return '<div class="notice-empty">' +
      '<div class="notice-empty-icon">📢</div>' +
      '<h2>' + title + '</h2>' +
      '<p>' + msg + '<br>급한 문의는 전화(061-642-1247) 또는 문의 폼으로 연락 주세요.</p>' +
      '</div>';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  filterBar.addEventListener('click', (e) => {
    if (!e.target.matches('.filter-btn')) return;
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.dataset.cat;
    renderList();
  });
})();
</script>

</body>
</html>
