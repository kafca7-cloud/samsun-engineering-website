<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[상품명] - ㈜삼선엔지니어링</title>
  <style>
    :root {
      --primary: #1C2B3A;
      --accent: #FFCD11;
      --bg: #F0F3F7;
      --text: #3D4B5C;
      --border: rgba(28, 43, 58, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Malgun Gothic', sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
    }

    .header {
      background: var(--primary);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .logo {
      width: 150px;
      height: auto;
      margin-bottom: 10px;
    }

    .section {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .hero-image {
      width: 100%;
      height: 200px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 15px;
      color: var(--primary);
    }

    h2 {
      font-size: 20px;
      margin-bottom: 15px;
      color: var(--primary);
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 15px;
    }

    .features {
      list-style: none;
      padding: 0;
    }

    .features li {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .features li:before {
      content: "✓";
      color: var(--accent);
      font-weight: bold;
      margin-right: 8px;
    }

    .cta-button {
      display: block;
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: var(--primary);
      text-align: center;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      margin-top: 20px;
    }

    .contact-info {
      background: var(--bg);
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
    }

    .contact-info p {
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="../../brand/logo/삼선로고_투명.png" alt="㈜삼선엔지니어링 로고" class="logo">
      <p>㈜삼선엔지니어링</p>
    </div>

    <div class="section">
      <div class="hero-image">
        [상품 이미지]
      </div>
      <h1>[상품명]</h1>
      <div class="price">[가격대]</div>
      <p>[상품 한 줄 설명]</p>
    </div>

    <div class="section">
      <h2>주요 특징</h2>
      <ul class="features">
        <li>[특징 1]</li>
        <li>[특징 2]</li>
        <li>[특징 3]</li>
        <li>[특징 4]</li>
      </ul>
    </div>

    <div class="section">
      <h2>사용법</h2>
      <p>[사용법 설명]</p>
    </div>

    <div class="section">
      <h2>고객 후기</h2>
      <p>[후기 내용]</p>
    </div>

    <div class="section">
      <h2>자주 묻는 질문</h2>
      <p><strong>Q: [질문 1]</strong><br>A: [답변 1]</p>
      <p><strong>Q: [질문 2]</strong><br>A: [답변 2]</p>
    </div>

    <div class="section">
      <a href="#contact" class="cta-button">견적 문의하기</a>
    </div>

    <div class="section contact-info">
      <h3>문의하기</h3>
      <p>T. 061-642-1247</p>
      <p>F. 061-642-8999</p>
      <p>E. samsun3618@hanmail.net</p>
      <p>주소: 전라남도 여수시 좌수영로 919</p>
    </div>
  </div>
</body>
</html>
